<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tigraoRADIO • Player</title>
    <style>
      :root {
        color-scheme: dark;
        --surface: rgba(18, 18, 18, 0.92);
        --text: #f5f5f5;
        --muted: #d1d1d1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0b0b0b;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
      }

      .player {
        width: min(100%, 360px);
        border-radius: 18px;
        overflow: hidden;
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
      }

      .cover {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }

      .info-tab {
        position: relative;
        isolation: isolate;
        padding: 16px;
        min-height: 120px;
      }

      .info-tab::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background-image: var(--cover-image);
        background-size: cover;
        background-repeat: no-repeat;
        background-position: top center;
        filter: blur(18px) brightness(0.55) saturate(1.25);
        transform: scale(1.1);
      }

      .info-tab::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(
          to bottom,
          rgba(10, 10, 10, 0.62),
          rgba(6, 6, 6, 0.82)
        );
      }

      .track-name {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.3;
        font-weight: 700;
      }

      .meta {
        margin: 8px 0 0;
        font-size: 0.92rem;
        color: var(--muted);
        line-height: 1.45;
      }

      .meta a,
      .track-name a {
        color: inherit;
        text-decoration: none;
      }

      .meta a:hover,
      .track-name a:hover,
      .meta a:focus-visible,
      .track-name a:focus-visible {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <article class="player" aria-label="Player de música">
      <img class="cover" id="cover" src="" alt="Capa do álbum" />

      <section class="info-tab" id="infoTab">
        <h1 class="track-name">
          <a id="trackName" href="#" aria-label="Link da música"></a>
        </h1>
        <p class="meta">
          Artista: <a id="artistName" href="#" aria-label="Link do artista"></a>
        </p>
        <p class="meta">
          Álbum: <a id="albumName" href="#" aria-label="Link do álbum"></a>
        </p>
      </section>
    </article>

    <script>
      const mockData = {
        track_name: "Blinding Lights",
        artist_name: "The Weeknd",
        album_name: "After Hours",
        cover_url:
          "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=800&q=80",
      };

      const params = new URLSearchParams(window.location.search);
      const data = {
        track_name: params.get("track_name") || mockData.track_name,
        artist_name: params.get("artist_name") || mockData.artist_name,
        album_name: params.get("album_name") || mockData.album_name,
        cover_url: params.get("cover_url") || mockData.cover_url,
      };

      const cover = document.getElementById("cover");
      const infoTab = document.getElementById("infoTab");
      const trackName = document.getElementById("trackName");
      const artistName = document.getElementById("artistName");
      const albumName = document.getElementById("albumName");

      cover.src = data.cover_url;
      cover.alt = `Capa de ${data.album_name}`;
      infoTab.style.setProperty("--cover-image", `url('${data.cover_url}')`);

      trackName.textContent = data.track_name;
      artistName.textContent = data.artist_name;
      albumName.textContent = data.album_name;

      // Links invisíveis (sem sublinhado, mesma cor), mantendo texto selecionável.
      trackName.href = "#";
      artistName.href = "#";
      albumName.href = "#";
    </script>
  </body>
</html>
