<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tigraoRADIO — Player (mock)</title>
    <style>
      :root {
        --cover-url: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1200&q=80');
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0f0f12;
        color: #fff;
        display: flex;
        justify-content: center;
      }

      .player {
        width: min(420px, 100%);
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        background: linear-gradient(180deg, #17171c 0%, #111217 100%);
      }

      .cover-wrapper {
        padding: 20px;
      }

      .cover {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        object-fit: cover;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      }

      .bottom-tab {
        position: relative;
        margin-top: auto;
        padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        overflow: hidden;
        isolation: isolate;
      }

      .bottom-tab::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: var(--cover-url);
        background-size: cover;
        background-position: center;
        transform: scale(1.2);
        filter: blur(18px) saturate(1.15);
        opacity: 0.45;
        z-index: -2;
      }

      .bottom-tab::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(14, 14, 18, 0.65);
        z-index: -1;
      }

      .label {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
      }

      .track-name {
        margin: 0;
        font-size: 26px;
        line-height: 1.2;
        font-weight: 700;
      }

      .artist {
        margin: 6px 0 0;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.88);
      }

      .hint {
        margin-top: 18px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <main class="player">
      <section class="cover-wrapper">
        <img id="cover" class="cover" alt="Capa da música atual" />
      </section>

      <section class="bottom-tab" aria-label="Informações da música">
        <p class="label">tocando agora</p>
        <h1 id="trackName" class="track-name"></h1>
        <p id="artist" class="artist"></p>
        <p class="hint">Dados mockados para a base visual do player.</p>
      </section>
    </main>

    <script>
      const mockData = {
        track_name: 'Noite na Frequência',
        artist: 'DJ Tigrao & Banda FM',
        cover_url:
          'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1200&q=80',
      };

      const cover = document.getElementById('cover');
      const trackName = document.getElementById('trackName');
      const artist = document.getElementById('artist');

      cover.src = mockData.cover_url;
      trackName.textContent = mockData.track_name;
      artist.textContent = mockData.artist;
      document.documentElement.style.setProperty('--cover-url', `url("${mockData.cover_url}")`);
    </script>
  </body>
</html>
