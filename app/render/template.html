<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <style>
      html,
      body {
        width: 1080px;
        height: 1350px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }

      .card {
        position: relative;
        width: 1080px;
        height: 1350px;
        background: #000;
      }

      .bg {
        position: absolute;
        inset: 0;
        background-image: url("{{COVER}}"), linear-gradient(180deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.9));
        background-size: cover;
        background-position: center;
        transform: scale(1.1);
        filter: blur(48px);
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.35) 0%,
          rgba(0, 0, 0, 0.45) 40%,
          rgba(0, 0, 0, 0.88) 100%
        );
      }

      .content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        padding: 64px;
        box-sizing: border-box;
      }

      .cover {
        width: 780px;
        height: 780px;
        object-fit: cover;
        border-radius: 24px;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
        margin-top: 24px;
      }

      .meta {
        margin-top: 56px;
        width: 100%;
      }

      .intro {
        font-size: 42px;
        font-weight: 600;
        margin: 0 0 24px;
        opacity: 0.95;
      }

      .track {
        font-size: 72px;
        line-height: 1.05;
        font-weight: 800;
        margin: 0 0 16px;
        letter-spacing: -0.02em;
      }

      .artist {
        font-size: 44px;
        font-weight: 500;
        margin: 0 0 14px;
        opacity: 0.95;
      }

      .album {
        font-size: 36px;
        font-weight: 500;
        margin: 0;
        opacity: 0.58;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="bg"></div>
      <div class="overlay"></div>

      <div class="content">
        <img class="cover" src="{{COVER}}" alt="cover" />

        <section class="meta">
          <p class="intro">🎧 {{USER}} está ouvindo…</p>
          <h1 class="track">{{TRACK}}</h1>
          <p class="artist">{{ARTIST}}</p>
          <p class="album">{{ALBUM}}</p>
        </section>
      </div>
    </div>
  </body>
</html>
